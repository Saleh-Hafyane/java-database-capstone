<!-- doctorDashboard.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - Smart Clinic</title>
    <link rel="icon" th:href="@{/assets/images/logo/Logo.png}">

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <!-- Scripts -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
    <script th:src="@{/js/components/patientRows.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content">
                <div class="toolbar">
                    <input type="text" id="searchBar" placeholder="Search patient..." />
                    <div class="filters">
                        <button id="todayBtn" class="filter-btn">Today's Appointments</button>
                        <input type="date" id="datePicker" />
                    </div>
                </div>

                <div class="table-container">
                    <table id="patientTable">
                        <thead>
                            <tr>
                                <th>Patient ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Prescription</th>
                            </tr>
                        </thead>
                        <tbody id="patientTableBody">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <!-- Service Scripts -->
    <script type="module" src="../js/services/patientServices.js" defer></script>
    <script type="module" src="../js/services/doctorDashboard.js" defer></script>
</body>
</html>
