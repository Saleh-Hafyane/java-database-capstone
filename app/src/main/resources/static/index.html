<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page Title -->
    <title>Select Role - Smart Clinic</title>

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/logo/Logo.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- JavaScript Files with defer -->
    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Wrapper for Structure -->
        <div class="wrapper">
            
            <!-- Header Placeholder -->
            <div id="header"></div>

            <!-- Main Section -->
            <main class="main-content">
                <!-- Heading for Role Selection -->
                <h2>Select Your Role</h2>

                <!-- Role Selection Buttons -->
                <div class="role-buttons">
                    <button id="adminBtn" class="role-btn" onclick="selectRole('ADMIN')">Admin</button>
                    <button id="patientBtn" class="role-btn" onclick="selectRole('PATIENT')">Patient</button>
                    <button id="doctorBtn" class="role-btn" onclick="selectRole('DOCTOR')">Doctor</button>
                </div>
            </main>

            <!-- Footer Placeholder -->
            <div id="footer"></div>

        </div>
    </div>

    <!-- Modal Structure -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <!-- Inner container for dynamic content -->
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Page-Specific Logic Module -->
    <script type="module" src="../js/services/index.js" defer></script>
</body>
</html>
