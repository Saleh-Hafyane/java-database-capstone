spring.thymeleaf.cache=false    
spring.thymeleaf.encoding=UTF-8

# ==========================================
# STATIC RESOURCES CONFIGURATION
# ==========================================
# Tells Spring to serve CSS, JS, and Images from the static folder
spring.web.resources.static-locations=classpath:/static/

# ==========================================
# THYMELEAF TEMPLATE ENGINE CONFIGURATION
# ==========================================
# Base path for HTML templates (e.g., dashboard, login pages)
spring.thymeleaf.prefix=classpath:/templates/

# Automatically append .html to view names returned by controllers
spring.thymeleaf.suffix=.html

# Rendering mode optimized for HTML5
spring.thymeleaf.mode=HTML

# Set to 'false' during development so changes appear without restarting
spring.thymeleaf.cache=false

# Global character encoding for internationalization support
spring.thymeleaf.encoding=UTF-8